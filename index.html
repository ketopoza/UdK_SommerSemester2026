<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Democracy and Autocracy Visualization</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="js/map.js"></script>
  <script type="module" src="js/timeline.js"></script>
  <script type="module" src="js/ridgeline.js"></script>
</head>

<body>
  <div id="container">

    <h2 id="map-title">Democracy Index over Space and Time</h2>
    <div id="map-container">
      <div id="map-svg-container"></div>
      <div id="slider">
        <span class="year-end">1900</span>
        <div id="slider-wrapper">
          <input type="range" id="year-slider" min="1900" max="2025" value="1900" step="1">
          <div id="year-tooltip">1900</div>
        </div>
        <span class="year-end">2025</span>
      </div>
    </div>

    <h2 id="timeline-title">Global Democracy Timeline</h2>
    <div id="timeline-container"></div>

    <h2 id="ridgeline-title">Democracy Trends in Europe by Region</h2>
    <div id="ridgeline-container"></div>

  </div>
</body>

</html>
